<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>师生登录 - 濮阳市第一中学龙源实验学校</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<div class="bg-primary text-white py-2 text-center">
    <h5 class="mb-0">濮阳市第一中学龙源实验学校</h5>
</div>
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary fs-4" href="../index.html">🏫 返回首页</a>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-5 shadow">
                <h3 class="text-center text-primary mb-4">师生登录入口</h3>
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">学号/教师工号</label>
                        <input type="text" class="form-control" placeholder="输入学号或工号" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">登录密码</label>
                        <input type="password" class="form-control" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">记住登录</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">登录</button>
                </form>
                <div class="text-center mt-3 text-secondary">
                    <p>暂无账号？线下到教务处登记注册</p>
                    <p>忘记密码请联系班主任</p>
                </div>
                <p class="text-center mt-4 text-secondary small">提示：纯静态页面，登录仅弹窗模拟，无账号验证功能</p>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white py-3 mt-5 text-center text-white-50">
    <small>濮阳市第一中学龙源实验学校 © 2026</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit',e=>{
    e.preventDefault();
    alert('静态页面仅模拟登录，无后台校验功能');
})
</script>
</body>
</html>
